<!DOCTYPE html><html lang="cs"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Newsletter Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#413357;
  display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
.wrap{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:16px;animation:fadeIn .8s ease-out}
.title{color:#ff80e3;font-size:13px;letter-spacing:2.5px;text-transform:uppercase;font-weight:600;margin-bottom:4px}
input{padding:13px 20px;border-radius:10px;border:2px solid #ff80e3;background:rgba(10,0,30,.75);color:#fff;font-size:16px;width:280px;outline:none;text-align:center;backdrop-filter:blur(12px)}
input:focus{border-color:#ff80e3;box-shadow:0 0 0 3px rgba(255,128,227,.2)}
button{background:#ff80e3;color:#0c0020;border:none;border-radius:10px;padding:12px 40px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s}
button:hover{opacity:.85}
.err{color:#ff6b6b;font-size:13px;display:none}
</style></head>
<body>
<div class="wrap">
<div class="title">Newsletter Dashboard</div>

function _reset(){clearTimeout(_t);_t=setTimeout(function(){document.body.innerHTML='';location.reload();},1200000);}

async function unlock(){
  var pw=document.getElementById("pw").value;
  try{
    var raw=atob(PAYLOAD);
    var bytes=new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);
    var salt=bytes.slice(0,16),iv=bytes.slice(16,28),ct=bytes.slice(28);
    var keyMat=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
    var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:100000,hash:"SHA-256"},keyMat,{name:"AES-GCM",length:256},false,["decrypt"]);
    var dec=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,ct);
    var html=new TextDecoder().decode(dec);
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById("err").style.display="block";
    document.getElementById("pw").value="";
  }
}
