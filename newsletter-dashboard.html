<!DOCTYPE html><html lang="cs"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Newsletter Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes pulse{0%,100%{opacity:.18;transform:scale(1)}50%{opacity:.32;transform:scale(1.08)}}
@keyframes pulse2{0%,100%{opacity:.12;transform:scale(1)}50%{opacity:.22;transform:scale(1.06)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0d0020;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;position:relative;overflow:hidden}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 50%,#1a0040 0%,#0d0020 70%)}
.circles{position:fixed;inset:0;z-index:0}
.c{position:absolute;border-radius:50%;border:1px solid rgba(255,128,227,.15)}
.c1{width:220px;height:220px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 3.5s ease-in-out infinite}
.c2{width:370px;height:370px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 3.5s ease-in-out infinite .4s}
.c3{width:520px;height:520px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse2 4s ease-in-out infinite .8s}
.c4{width:680px;height:680px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse2 4s ease-in-out infinite 1.2s}
.c5{width:840px;height:840px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse2 4.5s ease-in-out infinite 1.6s}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:16px;animation:fadeIn .8s ease-out}
.title{color:#ff80e3;font-size:13px;letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:8px}
input{padding:12px 20px;border-radius:8px;border:2px solid #413357;background:rgba(26,0,64,.8);color:#fff;font-size:16px;width:260px;outline:none;text-align:center;backdrop-filter:blur(8px)}
input:focus{border-color:#ff80e3}
button{background:#ff80e3;color:#11002d;border:none;border-radius:8px;padding:10px 32px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s}
button:hover{opacity:.85}
.err{color:#ff4444;font-size:13px;display:none}
</style></head>
<body>
<div class="bg"></div>
<div class="circles"><div class="c c1"></div><div class="c c2"></div><div class="c c3"></div><div class="c c4"></div><div class="c c5"></div></div>
<div class="wrap">
<div class="title">Newsletter Dashboard</div>
<input id="pw" type="password" placeholder="Heslo" autofocus onkeydown="if(event.key==='Enter')unlock()">
<button onclick="unlock()">Vstoupit</button>
<div class="err" id="err">Špatné heslo</div>
</div>

    var raw=atob(PAYLOAD);
    var bytes=new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);
    var salt=bytes.slice(0,16),iv=bytes.slice(16,28),ct=bytes.slice(28);
    var keyMat=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
    var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:100000,hash:"SHA-256"},keyMat,{name:"AES-GCM",length:256},false,["decrypt"]);
    var dec=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,ct);
    var html=new TextDecoder().decode(dec);
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById("err").style.display="block";
    document.getElementById("pw").value="";
  }
}
</script></body></html>
